<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Simboli Poetici</title>
</head>

<body style="text-align:center; font-family:serif; margin-top:80px; padding: 0 20px;">

  <h2>Crea il codice con simboli</h2>

  <!-- BARRA VISIVA -->
  <div id="barra"
       style="font-size:40px; margin-bottom:20px; min-height:50px;">
  </div>

  <!-- BOTTONI SIMBOLI -->

  <button onclick="aggiungi('▲','A')"
    style="font-size:40px; padding:10px 20px; margin-right:20px;">
    ▲
  </button>

  <button onclick="aggiungi('●','B')"
    style="font-size:40px; padding:10px 20px;">
    ●
  </button>

  <br><br>

  <!-- COMANDI -->
  <button onclick="invia()" style="font-size:18px;">Invia</button>
  <button onclick="reset()" style="font-size:18px;">Reset</button>

  <!-- OUTPUT -->
  <div id="output" style="margin-top:20px; font-size:20px;"></div>

  <script>

    // 🔥 codice interno
    let codiceInterno = "";

    // 👉 aggiunge simbolo + valore
    function aggiungi(simbolo, valore) {
      document.getElementById("barra").innerHTML += simbolo;
      codiceInterno += valore;
    }

    // 📖 poesie test
    const poesie = {
      "AB": {
        titolo: "Test poesia",
        testo: `funziona tutto 👍`
      }
    };

    // 🚀 invia
    function invia() {
      const output = document.getElementById("output");

      if (poesie[codiceInterno]) {
        output.innerHTML =
          "<h3>" + poesie[codiceInterno].titolo + "</h3>" +
          "<pre style='white-space:pre-wrap; font-size:18px;'>" +
          poesie[codiceInterno].testo +
          "</pre>";
      } else {
        output.innerHTML = "❌ codice non trovato: " + codiceInterno;
      }
    }

    // 🔄 reset
    function reset() {
      document.getElementById("barra").innerHTML = "";
      document.getElementById("output").innerHTML = "";
      codiceInterno = "";
    }

  </script>

</body>
</html>
