<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cuori e Picche - Poeta</title>
</head>

<body style="font-family: serif; text-align:center; margin-top:80px; padding: 0 20px;">

  <h2>Costruisci il codice con ❤️ e ♠️</h2>

  <!-- BARRA MOTORE -->
  <input id="input"
    style="font-size:24px; text-align:center; width:300px;"
    readonly
    placeholder="usa i bottoni sotto">

  <br><br>

  <!-- BOTTONI -->
  <button onclick="aggiungi('1')" style="font-size:40px; padding:10px 25px; margin-right:20px;">
    ❤️
  </button>

  <button onclick="aggiungi('0')" style="font-size:40px; padding:10px 25px;">
    ♠️
  </button>

  <br><br>

  <!-- COMANDI -->
  <button onclick="invia()" style="font-size:18px;">
    Invia
  </button>

  <button onclick="reset()" style="font-size:18px;">
    Reset
  </button>

  <!-- OUTPUT -->
  <p id="codice" style="margin-top:20px; color:#888;"></p>

  <div id="output" style="margin-top:30px; font-size:20px; white-space:pre-line;"></div>

  <script>
    // 📖 POESIE
    const poesie = {
      "1010": {
        titolo: "Goccia di storia",
        testo: `c'è una goccia di sangue o di rugiada
che scorre nella memoria del tempo`
      },

      "1100": {
        titolo: "Bandiere di pace",
        testo: `più bandiere nel vento
meno guerra nel mondo`
      },

      "1110": {
        titolo: "Luna di cenere",
        testo: `la luna cade lenta
come polvere nel cielo`
      }
    };

    // ➕ aggiunge 1 o 0 nella barra
    function aggiungi(valore) {
      document.getElementById("input").value += valore;
    }

    // 🚀 invia e controlla
    function invia() {
      let codice = document.getElementById("input").value;

      document.getElementById("codice").innerText = "Codice: " + codice;

      const output = document.getElementById("output");

      if (poesie[codice]) {
        output.innerHTML =
          "<h3>" + poesie[codice].titolo + "</h3>" +
          poesie[codice].testo;
      } else {
        output.innerHTML = "❌ Codice non valido";
      }
    }

    // 🔄 reset
    function reset() {
      document.getElementById("input").value = "";
      document.getElementById("codice").innerText = "";
      document.getElementById("output").innerHTML = "";
    }
  </script>

</body>
</html>
