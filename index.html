<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Simboli poetici</title>
</head>
<body style="font-family: serif; text-align:center; margin-top:80px; padding: 0 20px;">

  <h2>Inserisci ♥ e ♠</h2>

  <input id="input" placeholder="es: ♥♠♥♠" style="font-size:24px; text-align:center;">

  <br><br>

  <button onclick="converti()" style="font-size:18px;">
    Converti
  </button>

  <p id="codice" style="margin-top:20px; font-size:16px; color:#888;"></p>

  <div id="output" style="margin-top:30px; font-size:20px; max-width:600px; margin-left:auto; margin-right:auto; white-space:pre-line;"></div>

  <script>
    const poesie = {

      "1": {
        titolo: "La poesia del cuore",
        testo: `Il cuore non segue regole.

Bat­te.
Si ferma.
Riparte.

E ogni volta ricomincia come se fosse la prima.

Non chiede permesso,
non chiede senso.

Solo presenza.`
      },

      "0": {
        titolo: "La poesia del vuoto",
        testo: `Il vuoto non è assenza.

È spazio.

È ciò che resta quando tutto il resto tace.

E in quel silenzio,
qualcosa respira ancora.`
      },

      "10": {
        titolo: "Tra due mondi",
        testo: `Tra ciò che sono e ciò che divento
c’è una linea sottile.

Non è ferma.
Non è dritta.

È una domanda che cammina.`
      },

      "1010": {
        titolo: "La poesia lunga",
        testo: `Quando premi Converti,
non succede solo un codice.

Succede un passaggio.

Da simbolo a voce.
Da segno a presenza.

E quello che leggi adesso
non è un testo.

È un tentativo di restare.`
      }

    };

    function converti() {
      let testo = document.getElementById("input").value;
      let risultato = "";

      for (let i = 0; i < testo.length; i++) {
        if (testo[i] === "♥") risultato += "1";
        if (testo[i] === "♠") risultato += "0";
      }

      document.getElementById("codice").innerText = "Codice: " + risultato;

      const output = document.getElementById("output");
      const poesia = poesie[risultato];

      if (poesia) {
        output.innerHTML = "<h3>" + poesia.titolo + "</h3>" + poesia.testo;
      } else if (risultato.length === 0) {
        output.innerHTML = "";
      } else {
        output.innerHTML = "<span style='color:#aa3333;'>Nessuna poesia trovata per questo codice.</span>";
      }
    }
  </script>

</body>
</html>
