<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Alfabeto Simbolico</title>
</head>

<body style="text-align:center; font-family:serif; margin-top:60px; padding:20px;">

  <h2>Costruisci il codice simbolico</h2>

  <!-- BARRA VISIVA -->
  <div id="barra"
       style="font-size:40px; margin:20px auto; min-height:60px;">
  </div>

  <!-- 🔥 BOTTONI (TUTTI VISIBILI E FUNZIONANTI) -->

  <div style="margin-bottom:10px;">
    <button onclick="aggiungi('▲','A')" style="font-size:40px;">▲</button>
    <button onclick="aggiungi('●','B')" style="font-size:40px;">●</button>
    <button onclick="aggiungi('■','C')" style="font-size:40px;">■</button>
  </div>

  <div style="margin-bottom:10px;">
    <button onclick="aggiungi('★','D')" style="font-size:40px;">★</button>
    <button onclick="aggiungi('☾','E')" style="font-size:40px;">☾</button>
    <button onclick="aggiungi('⚫','F')" style="font-size:40px;">⚫</button>
  </div>

  <div style="margin-bottom:10px;">
    <button onclick="aggiungi('✶','G')" style="font-size:40px;">✶</button>
    <button onclick="aggiungi('⌖','H')" style="font-size:40px;">⌖</button>
    <button onclick="aggiungi('☀','I')" style="font-size:40px;">☀</button>
  </div>

  <br>

  <!-- COMANDI -->
  <button onclick="invia()" style="font-size:18px;">Invia</button>
  <button onclick="reset()" style="font-size:18px;">Reset</button>

  <!-- OUTPUT -->
  <div id="output" style="margin-top:20px; font-size:20px;"></div>

  <script>

    // 🔥 codice interno
    let codiceInterno = "";

    // 👉 aggiunge simbolo + lettera
    function aggiungi(simbolo, valore) {
      document.getElementById("barra").innerHTML += simbolo;
      codiceInterno += valore;
    }

    // 📖 poesie esempio (puoi cambiare)
    const poesie = {

      "AB": {
        titolo: "Test base",
        testo: `funziona 👍`
      },

      "ABC": {
        titolo: "Sequenza 3 simboli",
        testo: `hai attivato una combinazione semplice`
      },

      "ABCDE": {
        titolo: "Sequenza completa",
        testo: `hai attivato una poesia segreta`
      }

    };

    // 🚀 invio
    function invia() {
      const output = document.getElementById("output");

      if (poesie[codiceInterno]) {
        output.innerHTML =
          "<h3>" + poesie[codiceInterno].titolo + "</h3>" +
          "<pre style='white-space:pre-wrap; font-size:18px;'>" +
          poesie[codiceInterno].testo +
          "</pre>";
      } else {
        output.innerHTML =
          "❌ nessuna poesia per: " + codiceInterno;
      }
    }

    // 🔄 reset
    function reset() {
      document.getElementById("barra").innerHTML = "";
      document.getElementById("output").innerHTML = "";
      codiceInterno = "";
    }

  </script>

</body>
</html>
