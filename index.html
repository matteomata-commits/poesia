<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Alfabeto Poetico</title>
</head>

<body style="text-align:center; font-family:serif; margin-top:60px; padding: 0 20px;">

  <h2>Costruisci il codice simbolico</h2>

  <!-- BARRA VISIVA -->
  <div id="barra"
       style="font-size:40px; margin:20px auto; min-height:60px;">
  </div>

  <!-- 🔥 SIMBOLI (PUOI AGGIUNGERNE ALTRI QUI SOTTO) -->

  <button onclick="aggiungi('▲','A')" style="font-size:40px; margin:5px;">▲</button>
  <button onclick="aggiungi('●','B')" style="font-size:40px; margin:5px;">●</button>
  <button onclick="aggiungi('■','C')" style="font-size:40px; margin:5px;">■</button>
  <button onclick="aggiungi('★','D')" style="font-size:40px; margin:5px;">★</button>
  <button onclick="aggiungi('☾','E')" style="font-size:40px; margin:5px;">☾</button>

  <!-- 👉 ESEMPI AGGIUNTI (puoi duplicare questo blocco) -->
  <button onclick="aggiungi('⚫','F')" style="font-size:40px; margin:5px;">⚫</button>
  <button onclick="aggiungi('✶','G')" style="font-size:40px; margin:5px;">✶</button>
  <button onclick="aggiungi('⌖','H')" style="font-size:40px; margin:5px;">⌖</button>

  <br><br>

  <!-- COMANDI -->
  <button onclick="invia()" style="font-size:18px;">Invia</button>
  <button onclick="reset()" style="font-size:18px;">Reset</button>

  <!-- OUTPUT -->
  <div id="output" style="margin-top:20px; font-size:20px;"></div>

  <script>

    // 🔥 codice interno (logico)
    let codiceInterno = "";

    // 👉 FUNZIONE GENERALE
    function aggiungi(simbolo, valore) {
      document.getElementById("barra").innerHTML += simbolo;
      codiceInterno += valore;
    }

    // 📖 POESIE (PUOI ESPANDERE QUI)
    const poesie = {

      "AB": {
        titolo: "Test base",
        testo: `funziona 👍`
      },

      "ABCDE": {
        titolo: "Combinazione 5 simboli",
        testo: `hai attivato una sequenza completa`
      },

      "ABCDEFG": {
        titolo: "Poesia estesa",
        testo: `sequenza lunga attivata`
      }

    };

    // 🚀 INVIO
    function invia() {
      const output = document.getElementById("output");

      if (poesie[codiceInterno]) {
        output.innerHTML =
          "<h3>" + poesie[codiceInterno].titolo + "</h3>" +
          "<pre style='white-space:pre-wrap; font-size:18px;'>" +
          poesie[codiceInterno].testo +
          "</pre>";
      } else {
        output.innerHTML =
          "❌ nessuna poesia per: " + codiceInterno;
      }
    }

    // 🔄 RESET
    function reset() {
      document.getElementById("barra").innerHTML = "";
      document.getElementById("output").innerHTML = "";
      codiceInterno = "";
    }

  </script>

</body>
</html>
