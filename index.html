<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Simboli poetici</title>
</head>
<body style="font-family: serif; text-align:center; margin-top:80px;">

  <h2>Inserisci ♥ e ♠</h2>

  <input id="input" placeholder="es: ♥♠♥♠" style="font-size:24px; text-align:center;">

  <br><br>

  <button onclick="converti()" style="font-size:18px;">
    Converti
  </button>

  <p id="output" style="margin-top:30px; font-size:20px;"></p>

  <script>
    function converti() {
      let testo = document.getElementById("input").value;
      let risultato = "";

      for (let i = 0; i < testo.length; i++) {
        if (testo[i] === "♥") risultato += "1";
        if (testo[i] === "♠") risultato += "0";
      }

      document.getElementById("output").innerText = "Codice: " + risultato;
    }
  </script>

</body>
</html>
