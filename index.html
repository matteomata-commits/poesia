<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Simboli poetici</title>
</head>

<body style="font-family: serif; text-align:center; margin-top:80px; padding: 0 20px;">

  <h2>Costruisci il codice</h2>

  <!-- INPUT VISIVO -->
  <input id="input" readonly
    style="font-size:24px; text-align:center; width:300px;">

  <br><br>

  <!-- BOTTONI -->
  <div style="display:flex; justify-content:center; gap:40px; margin-bottom:20px;">

    <button onclick="aggiungi('1')"
      style="font-size:30px; padding:10px 20px;">
      ❤️
    </button>

    <button onclick="aggiungi('0')"
      style="font-size:30px; padding:10px 20px;">
      ♠️
    </button>

  </div>

  <button onclick="converti()" style="font-size:18px;">
    Converti
  </button>

  <button onclick="reset()" style="font-size:18px;">
    Reset
  </button>

  <p id="codice" style="margin-top:20px; font-size:16px; color:#888;"></p>

  <div id="output" style="margin-top:30px; font-size:20px; max-width:700px; margin-left:auto; margin-right:auto; white-space:pre-line;"></div>

  <script>
    const poesie = {
      "1010": {
        titolo: "Goccia di storia",
        testo: `c'è una goccia di sangue o di rugiada
che sdrucciola, tra i solchi della storia
che rende viva la carne dell'uomo
c'è una goccia di sangue o di rugiada
che scorre, tra gli incavi della fronte
di gente in gente, per generazioni
sulla tacita pelle dei mortali
ai primi raggi del sole essa appare
e rifulge di morte e primavera`
      },

      "1100": {
        titolo: "Bandiere di pace",
        testo: `più bandiere di pace
sulla terra
basta soldati morti
per la guerra

più aquiloni in volo
più colombe
basta a chi soffoca
il cielo di bombe

più fratelli nel mondo
più alleati
inondiamo di fiori
i carri armati

più libri per bambini
e per bambine
basta fucili
bombe a mano e mine

che il vento scuota
le nostre bandiere
basta bunker
trincee e frontiere`
      },

      "1110": {
        titolo: "Luna di cenere",
        testo: `oggi la luna è una perla di cenere
che si fa polvere tra le mie dita
oggi la luna è una perla di cenere
che sporca il grano e soffoca il raccolto

sferza nel cielo un tumulto di lame
grigie le lacrime, austere le nuvole
tacito ascolto il pianto del bracciante
che per anni ha mietuto il suo raccolto

oggi la luna è una perla di cenere
che si fa polvere tra le mie dita
oggi la luna è una perla di cenere
che fa eco alle rovine del passato`
      }
    };

    function aggiungi(valore) {
      document.getElementById("input").value += valore;
    }

    function reset() {
      document.getElementById("input").value = "";
      document.getElementById("codice").innerText = "";
      document.getElementById("output").innerHTML = "";
    }

    function converti() {
      let risultato = document.getElementById("input").value;

      document.getElementById("codice").innerText = "Codice: " + risultato;

      const poesia = poesie[risultato];
      const output = document.getElementById("output");

      if (poesia) {
        output.innerHTML = "<h3>" + poesia.titolo + "</h3>" + poesia.testo;
      } else if (risultato.length === 0) {
        output.innerHTML = "";
      } else {
        output.innerHTML = "<span style='color:#aa3333;'>Nessuna poesia trovata</span>";
      }
    }
  </script>

</body>
</html>
