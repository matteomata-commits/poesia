<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Simboli</title>
</head>

<body style="text-align:center; font-family:serif; margin-top:60px;">

  <h2>Test simboli</h2>

  <div id="barra" style="font-size:40px; margin:20px;"></div>

  <button onclick="add('▲','A')" style="font-size:40px;">▲</button>
  <button onclick="add('●','B')" style="font-size:40px;">●</button>
  <button onclick="add('■','C')" style="font-size:40px;">■</button>

  <br><br>

  <button onclick="check()">Invia</button>
  <button onclick="reset()">Reset</button>

  <div id="out" style="margin-top:20px;"></div>

  <script>
    let code = "";

    function add(symbol, val) {
      document.getElementById("barra").innerHTML += symbol;
      code += val;

      console.log("barra:", document.getElementById("barra").innerHTML);
      console.log("code:", code);
    }

    function check() {
      if (code === "ABC") {
        document.getElementById("out").innerHTML = "✔ poesia sbloccata";
      } else {
        document.getElementById("out").innerHTML = "❌ codice: " + code;
      }
    }

    function reset() {
      code = "";
      document.getElementById("barra").innerHTML = "";
      document.getElementById("out").innerHTML = "";
    }
  </script>

</body>
</html>
